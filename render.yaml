services:
  # PredictIQ FastAPI Backend Service
  - type: web
    name: predictiq-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        sync: false # User will set this in the Render dashboard to connect to Supabase
      - key: GROQ_API_KEY
        sync: false # User will set this in the Render dashboard for the AI chat controller
